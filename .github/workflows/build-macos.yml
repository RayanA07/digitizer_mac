name: Build macOS 2.12

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: macOS Tahoe build
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Homebrew packages
        run: |
          brew update
          brew install tesseract dylibbundler

      - name: Build Digitizer.app
        run: |
          cd Digitizer
          bash build_macos.sh

      - name: Build AccuracyTester.app
        run: |
          cd AccuracyTester
          bash build_macos.sh

      - name: Upload Digitizer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Digitizer-macos
          path: Digitizer/dist/*.zip

      - name: Upload AccuracyTester artifact
        uses: actions/upload-artifact@v4
        with:
          name: AccuracyTester-macos
          path: AccuracyTester/dist/*.zip

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Data Digitizer 2.12 (macOS)
          body_path: RELEASE_NOTES.md
          files: |
            Digitizer/dist/*.zip
            AccuracyTester/dist/*.zip
